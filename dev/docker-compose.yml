version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: dev/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/homelab.db
      - SECRET_KEY=test-secret-key-for-development-only
      - SMTP_HOST=
      - SMTP_PORT=587
    networks:
      - homelab

networks:
  homelab:
    driver: bridge

volumes:
  data:
