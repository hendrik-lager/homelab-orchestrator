# LXC Configuration Template for HomeLab Orchestrator
# This is a reference template - the create-lxc.sh script creates the container automatically
# Usage: bash deployment/create-lxc.sh on Proxmox VE

# CPU and Memory
cores: 2
memory: 2048
swap: 512

# Network - DHCP by default, adjust after creation if needed
net0: name=eth0,bridge=vmbr0,firewall=1,hwaddr=XX:XX:XX:XX:XX:XX,ip=dhcp,type=veth

# Storage
rootfs: local-lvm:vm-{vmid}-disk-0,size=8G

# Unprivileged container (required for nesting)
lxc.idmap: u 0 100000 65536
lxc.idmap: g 0 100000 65536

# Autostart
onboot: 1
startup: order=1,up=10

# Nesting support (needed for docker/pip in LXC)
features: nesting=1
